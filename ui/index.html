<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTX YTDownloader Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c0: #020608;
  --c1: #0a1628;
  --c2: #0d1f3c;
  --cyan: #00d4ff;
  --cyan2: #00f5d4;
  --pink: #ff3d8b;
  --purple: #8b5cf6;
  --white: #ffffff;
  --g1: rgba(0,212,255,0.08);
  --g2: rgba(255,61,139,0.06);
  --g3: rgba(139,92,246,0.05);
  --border-glass: rgba(255,255,255,0.06);
  --border-cyan: rgba(0,212,255,0.2);
  --text1: rgba(255,255,255,0.92);
  --text2: rgba(255,255,255,0.45);
  --text3: rgba(255,255,255,0.2);
}

html { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--c0);
  color: var(--text1);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 16px 40px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ════ SCENE ════ */
.scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.scene-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 80% at 20% -10%, rgba(0,212,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 80% 110%, rgba(255,61,139,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(139,92,246,0.04) 0%, transparent 60%),
    linear-gradient(180deg, #020a18 0%, #020608 40%, #030206 100%);
}

.aurora {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  animation: auroraMove var(--dur, 12s) ease-in-out infinite alternate;
  will-change: transform;
}
.aurora-1 { width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,212,255,0.06) 0%,transparent 70%);top:-150px;left:-100px;--dur:15s; }
.aurora-2 { width:500px;height:500px;background:radial-gradient(ellipse,rgba(255,61,139,0.05) 0%,transparent 70%);bottom:-200px;right:-100px;--dur:20s;animation-direction:alternate-reverse; }
.aurora-3 { width:300px;height:300px;background:radial-gradient(ellipse,rgba(139,92,246,0.06) 0%,transparent 70%);top:30%;left:60%;--dur:18s; }

@keyframes auroraMove {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px,30px) scale(1.15); }
}

.dot-grid {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
}

/* ════ APP ════ */
.app {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 620px;
  min-width: 460px;
  animation: appReveal 0.9s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes appReveal {
  from { opacity:0; transform:translateY(40px) scale(0.96); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.glass-card {
  background: linear-gradient(135deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-radius: 32px;
  border: 1px solid var(--border-glass);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 40px 80px rgba(0,0,0,0.6),
    0 0 100px rgba(0,212,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.07),
    inset 0 -1px 0 rgba(0,0,0,0.3);
  padding: 40px 36px 36px;
  position: relative;
  overflow: hidden;
}

.glass-card::before {
  content: '';
  position: absolute;
  top:0; left:15%; right:15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), rgba(255,255,255,0.15), rgba(0,212,255,0.5), transparent);
  animation: shimmerEdge 4s ease-in-out infinite;
}

@keyframes shimmerEdge {
  0%,100% { opacity:0.5; }
  50% { opacity:1; }
}

/* ════ LOGO ════ */
.logo-area {
  display: flex;
  justify-content: center;
  margin-bottom: 30px;
  position: relative;
  z-index: 1;
}

.logo-area img {
  max-width: 360px;
  height: auto;
  filter: drop-shadow(0 0 24px rgba(0,212,255,0.3)) drop-shadow(0 0 60px rgba(0,212,255,0.1)) brightness(1.05);
  animation: logoFloat 6s ease-in-out infinite;
  transition: filter 0.3s;
}

.logo-area img:hover {
  filter: drop-shadow(0 0 36px rgba(0,212,255,0.5)) drop-shadow(0 0 80px rgba(0,212,255,0.2)) brightness(1.1);
}

@keyframes logoFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ════ DIVIDER ════ */
.hr {
  height: 1px;
  margin: 24px 0;
  background: linear-gradient(90deg, transparent 0%, rgba(0,212,255,0.15) 20%, rgba(255,255,255,0.08) 50%, rgba(0,212,255,0.15) 80%, transparent 100%);
  position: relative;
  z-index: 1;
}

/* ════ CONTROLS ════ */
.row-controls {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.glass-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1px solid var(--border-glass);
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
  color: var(--text1);
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.23,1,0.32,1);
  position: relative;
  overflow: hidden;
  letter-spacing: 0.2px;
}

.glass-btn::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
  pointer-events:none;
}

.glass-btn:hover {
  background: rgba(0,212,255,0.07);
  border-color: var(--border-cyan);
  box-shadow: 0 0 24px rgba(0,212,255,0.12), inset 0 0 20px rgba(0,212,255,0.04);
  color: var(--cyan);
  transform: translateY(-1px);
}

.glass-btn:active { transform: scale(0.97); }

#btn-save {
  flex:1;
  height:52px;
  padding:0 20px;
}

.select-wrap { position:relative; flex-shrink:0; }

#format-select {
  appearance:none;
  height:52px;
  padding:0 38px 0 18px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(10px);
  border:1px solid var(--border-glass);
  border-radius:16px;
  color:var(--cyan);
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.3px;
  width:120px;
}

#format-select:hover,#format-select:focus {
  border-color:var(--border-cyan);
  background:rgba(0,212,255,0.06);
  box-shadow:0 0 20px rgba(0,212,255,0.1);
  outline:none;
}

#format-select option { background:#0a1628; color:#fff; }

.select-arrow {
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  color:var(--cyan);
  font-size:9px;
  opacity:0.7;
}

/* ════ PATH BADGE ════ */
.path-badge {
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:12px;
  padding:10px 16px;
  margin-bottom:20px;
  position:relative;
  z-index:1;
  transition:all 0.3s;
}

.path-badge.active {
  border-color:rgba(0,212,255,0.12);
  background:rgba(0,212,255,0.04);
}

.path-dot {
  width:7px;height:7px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  flex-shrink:0;
  transition:all 0.3s;
}

.path-badge.active .path-dot {
  background:var(--cyan2);
  box-shadow:0 0 8px rgba(0,245,212,0.6);
  animation:dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%,100% { box-shadow:0 0 6px rgba(0,245,212,0.6); }
  50% { box-shadow:0 0 14px rgba(0,245,212,0.9),0 0 28px rgba(0,245,212,0.3); }
}

.path-text {
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text2);
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  letter-spacing:0.2px;
  transition:color 0.3s;
}

.path-badge.active .path-text { color:rgba(0,245,212,0.8); }

/* ════ URL INPUT ════ */
#input-container { position:relative; z-index:1; }

.input-row {
  display:flex;
  gap:10px;
  margin-bottom:10px;
  animation:rowIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes rowIn {
  from { opacity:0; transform:translateX(-16px); }
  to   { opacity:1; transform:translateX(0); }
}

.url-input {
  flex:1;
  height:50px;
  padding:0 18px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:14px;
  color:var(--text1);
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px;
  transition:all 0.25s;
  letter-spacing:0.2px;
}

.url-input::placeholder { color:var(--text3); font-family:'Inter',sans-serif; }

.url-input:focus {
  outline:none;
  border-color:rgba(0,212,255,0.25);
  background:rgba(0,212,255,0.04);
  box-shadow:0 0 0 3px rgba(0,212,255,0.06),0 0 30px rgba(0,212,255,0.08);
}

.btn-add {
  width:50px;
  height:50px;
  background:rgba(0,212,255,0.08);
  border:1px solid rgba(0,212,255,0.2);
  border-radius:14px;
  color:var(--cyan);
  font-size:22px;
  font-weight:300;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
  flex-shrink:0;
}

.btn-add:hover {
  background:var(--cyan);
  color:#000;
  border-color:var(--cyan);
  box-shadow:0 0 20px rgba(0,212,255,0.3),0 0 40px rgba(0,212,255,0.1);
  transform:translateY(-2px) scale(1.05);
}

.btn-add:active { transform:scale(0.95); }

/* ════ DOWNLOAD BUTTON ════ */
.btn-download {
  width:100%;
  height:58px;
  margin-top:16px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,rgba(255,61,139,0.9) 0%,rgba(255,61,139,0.75) 50%,rgba(200,40,110,0.9) 100%);
  color:white;
  font-family:'Inter',sans-serif;
  font-weight:700;
  font-size:13px;
  letter-spacing:2.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.23,1,0.32,1);
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(255,61,139,0.25),0 1px 0 rgba(255,255,255,0.1) inset,0 0 0 1px rgba(255,61,139,0.3);
  z-index:1;
}

.btn-download::before {
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 50%);
  pointer-events:none;
}

.btn-download::after {
  content:'';
  position:absolute;
  top:0;left:-100%;bottom:0;
  width:60%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
  transform:skewX(-20deg);
  transition:left 0.6s ease;
}

.btn-download:hover::after { left:140%; }

.btn-download:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 36px rgba(255,61,139,0.35),0 0 60px rgba(255,61,139,0.12),0 1px 0 rgba(255,255,255,0.15) inset;
}

.btn-download:active { transform:scale(0.98); }

/* ════ CARDS ════ */
#list { position:relative; z-index:1; }

.card {
  display:flex;
  gap:14px;
  align-items:center;
  background:rgba(255,255,255,0.025);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:20px;
  padding:14px 16px;
  margin-top:12px;
  animation:cardReveal 0.4s cubic-bezier(0.16,1,0.3,1) both;
  transition:all 0.3s;
  position:relative;
  overflow:hidden;
}

.card::before {
  content:'';
  position:absolute;
  left:0;top:20%;bottom:20%;
  width:2px;
  background:linear-gradient(180deg,transparent,var(--cyan),transparent);
  border-radius:2px;
  opacity:0.4;
}

@keyframes cardReveal {
  from { opacity:0; transform:translateY(12px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.card:hover {
  background:rgba(255,255,255,0.04);
  border-color:rgba(0,212,255,0.08);
  transform:translateY(-1px);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.thumb-img {
  width:96px;
  height:58px;
  border-radius:12px;
  object-fit:cover;
  background:rgba(0,0,0,0.4);
  flex-shrink:0;
  border:1px solid rgba(255,255,255,0.04);
}

.card-content { flex:1; min-width:0; }

.fname {
  font-size:13px;
  font-weight:600;
  color:var(--text1);
  margin-bottom:10px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  letter-spacing:0.1px;
}

.progress-row { display:flex; align-items:center; gap:10px; }

.progress-bar {
  flex:1;
  height:5px;
  background:rgba(255,255,255,0.06);
  border-radius:99px;
  overflow:hidden;
}

.fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--cyan2));
  border-radius:99px;
  transition:width 0.4s ease;
  box-shadow:0 0 10px rgba(0,212,255,0.4);
  position:relative;
}

.fill::after {
  content:'';
  position:absolute;
  right:0;top:0;bottom:0;
  width:30px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));
  border-radius:99px;
}

.pct {
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:500;
  color:var(--cyan);
  width:38px;
  text-align:right;
  letter-spacing:0.5px;
  flex-shrink:0;
}

.card.completed { border-color:rgba(0,245,212,0.12); }
.card.completed::before { background:linear-gradient(180deg,transparent,var(--cyan2),transparent);opacity:0.7; }
.card.completed .fname { color:var(--cyan2); }
.card.completed .fill { background:linear-gradient(90deg,var(--cyan2),#80ffea);box-shadow:0 0 12px rgba(0,245,212,0.5); }
.card.completed .pct { color:var(--cyan2); }

/* ════ TERMINAL ════ */
.terminal-wrap { position:relative; z-index:1; margin-top:20px; }

.terminal-header {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.term-dot {
  width:8px;height:8px;
  border-radius:50%;
  animation:termBlink 2.5s ease-in-out infinite;
}

.term-dot-1 { background:#ff5f57; animation-delay:0s; }
.term-dot-2 { background:#febc2e; animation-delay:0.3s; }
.term-dot-3 { background:#28c840; animation-delay:0.6s; }

@keyframes termBlink {
  0%,80%,100% { opacity:1; }
  40% { opacity:0.5; }
}

.term-label {
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--text3);
  margin-left:4px;
  letter-spacing:1px;
  text-transform:uppercase;
}

#terminal {
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:16px;
  padding:14px 16px;
  height:145px;
  overflow-y:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:rgba(0,212,255,0.65);
  line-height:1.6;
  white-space:pre-wrap;
  word-break:break-all;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.4);
}

#terminal::-webkit-scrollbar { width:3px; }
#terminal::-webkit-scrollbar-thumb { background:rgba(0,212,255,0.1);border-radius:99px; }

.log-entry { line-height:1.6; }
.log-ok    { color:rgba(0,245,212,0.8); }
.log-error { color:rgba(255,61,139,0.85); }

.term-cursor {
  display:inline-block;
  width:7px;height:12px;
  background:var(--cyan);
  opacity:0.7;
  animation:cursorBlink 1s step-end infinite;
  vertical-align:middle;
  border-radius:1px;
  margin-left:2px;
}

@keyframes cursorBlink {
  0%,100% { opacity:0.7; }
  50% { opacity:0; }
}

/* ════ TOAST ════ */
#toast {
  visibility:hidden;
  position:fixed;
  z-index:99999;
  bottom:36px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(10,22,40,0.95);
  backdrop-filter:blur(30px);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:14px;
  padding:13px 22px;
  font-size:13px;
  font-weight:500;
  color:var(--text1);
  box-shadow:0 12px 40px rgba(0,0,0,0.7),0 0 30px rgba(0,212,255,0.08);
  opacity:0;
  transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  white-space:nowrap;
  letter-spacing:0.2px;
}

#toast.show { visibility:visible;opacity:1;transform:translateX(-50%) translateY(0); }

/* ════ MODAL ════ */
#folder-modal {
  display:none;
  position:fixed;
  inset:0;
  z-index:99998;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(20px);
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,rgba(255,255,255,0.01) 100%);
  backdrop-filter:blur(50px) saturate(200%);
  -webkit-backdrop-filter:blur(50px) saturate(200%);
  border:1px solid rgba(0,212,255,0.15);
  border-radius:28px;
  padding:28px;
  width:92%;
  max-width:500px;
  box-shadow:0 40px 80px rgba(0,0,0,0.8),0 0 60px rgba(0,212,255,0.05),inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative;
  animation:modalIn 0.3s cubic-bezier(0.16,1,0.3,1);
  overflow:hidden;
}

.modal-box::before {
  content:'';
  position:absolute;
  top:0;left:10%;right:10%;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);
}

@keyframes modalIn {
  from { opacity:0;transform:scale(0.93) translateY(20px); }
  to   { opacity:1;transform:scale(1) translateY(0); }
}

.modal-close {
  position:absolute;
  top:18px;right:18px;
  width:30px;height:30px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;
  color:var(--text2);
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
}

.modal-close:hover { background:rgba(255,61,139,0.1);border-color:rgba(255,61,139,0.3);color:var(--pink); }

.modal-title {
  font-size:14px;
  font-weight:700;
  color:var(--cyan);
  margin-bottom:14px;
  letter-spacing:0.5px;
  display:flex;
  align-items:center;
  gap:8px;
}

#current-path-display {
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:rgba(0,212,255,0.6);
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(0,212,255,0.08);
  border-radius:10px;
  padding:9px 14px;
  margin-bottom:12px;
  overflow-x:auto;
  white-space:nowrap;
  letter-spacing:0.2px;
}

#folder-list-container {
  height:300px;
  overflow-y:auto;
  background:rgba(0,0,0,0.2);
  border:1px solid rgba(255,255,255,0.04);
  border-radius:16px;
}

#folder-list-container::-webkit-scrollbar { width:3px; }
#folder-list-container::-webkit-scrollbar-thumb { background:rgba(0,212,255,0.1);border-radius:99px; }

.folder-item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.03);
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  color:var(--text1);
  transition:all 0.15s;
  letter-spacing:0.1px;
}

.folder-item:last-child { border-bottom:none; }

.folder-item:hover {
  background:rgba(0,212,255,0.05);
  color:var(--cyan);
  padding-left:22px;
}

.empty-msg {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--text3);
}

.modal-actions {
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr;
  gap:10px;
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,0.04);
}

.m-btn {
  height:44px;
  border-radius:12px;
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:12px;
  letter-spacing:0.5px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  transition:all 0.2s;
  border:none;
}

.m-btn-back { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);color:var(--text2); }
.m-btn-back:hover { background:rgba(255,255,255,0.07);color:var(--text1);border-color:rgba(255,255,255,0.1); }

.m-btn-new { background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);color:var(--cyan); }
.m-btn-new:hover { background:rgba(0,212,255,0.12);box-shadow:0 0 16px rgba(0,212,255,0.12); }

.m-btn-select { background:linear-gradient(135deg,var(--cyan) 0%,var(--cyan2) 100%);color:#000;font-weight:700; }
.m-btn-select:hover { box-shadow:0 0 24px rgba(0,212,255,0.35),0 0 48px rgba(0,212,255,0.1);transform:translateY(-1px); }

.m-btn:active { transform:scale(0.96); }
</style>
</head>
<body>

<div class="scene">
  <div class="scene-bg"></div>
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
  <div class="dot-grid"></div>
</div>

<div class="app">
  <div class="glass-card">

    <div class="logo-area">
      <img src="logoo.png" alt="RTX">
    </div>

    <div class="hr"></div>

    <div class="row-controls">
      <button id="btn-save" class="glass-btn">
        <span>📂</span><span>SELECT SAVE LOCATION</span>
      </button>
      <div class="select-wrap">
        <select id="format-select">
          <option value="mp3">🎵  MP3</option>
          <option value="mp4">🎬  MP4</option>
          <option value="mkv">🎥  MKV</option>
          <option value="avi">📺  AVI</option>
        </select>
        <span class="select-arrow">▼</span>
      </div>
    </div>

    <div class="path-badge" id="path-badge">
      <div class="path-dot"></div>
      <div class="path-text" id="path-info">No location selected</div>
    </div>

    <div id="input-container">
      <div class="input-row">
        <input type="text" class="url-input" placeholder="Paste YouTube URL...">
        <button class="btn-add" id="add-url">+</button>
      </div>
    </div>

    <button id="start-btn" class="btn-download">⚡ &nbsp;&nbsp; START DOWNLOAD</button>

    <div id="list"></div>

    <div class="hr" style="margin-top:20px;"></div>

    <div class="terminal-wrap">
      <div class="terminal-header">
        <div class="term-dot term-dot-1"></div>
        <div class="term-dot term-dot-2"></div>
        <div class="term-dot term-dot-3"></div>
        <span class="term-label">RTX CORE CONSOLE</span>
      </div>
      <div id="terminal">SYSTEM BOOT — RTX CORE v3.0<span class="term-cursor"></span></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<div id="folder-modal">
  <div class="modal-box">
    <button class="modal-close" id="modal-close-btn">&times;</button>
    <div class="modal-title">📂 &nbsp; SELECT STORAGE LOCATION</div>
    <div id="current-path-display">/</div>
    <div id="folder-list-container"></div>
    <div class="modal-actions">
      <button class="m-btn m-btn-back" id="modal-back-btn">⬅ Back</button>
      <button class="m-btn m-btn-new" id="modal-new-folder-btn">＋ New</button>
      <button class="m-btn m-btn-select" id="modal-select-btn">Select ✓</button>
    </div>
  </div>
</div>

<script type="module">
const { invoke } = window.__TAURI__.core;
const { message } = window.__TAURI__.dialog;
const { listen } = window.__TAURI__.event;

let savePath = "";
let currentNavPath = "";

document.getElementById('add-url').onclick = () => {
  const d = document.createElement('div');
  d.className = 'input-row';
  d.innerHTML = '<input type="text" class="url-input" placeholder="Paste YouTube URL...">';
  document.getElementById('input-container').appendChild(d);
};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

listen('log-event', e => {
  const terminal = document.getElementById('terminal');
  terminal.querySelectorAll('.term-cursor').forEach(c => c.remove());
  const div = document.createElement('div');
  div.className = 'log-entry';
  const txt = e.payload;
  if (txt.includes('✅') || txt.includes('READY') || txt.includes('OK')) div.classList.add('log-ok');
  else if (txt.includes('❌') || txt.includes('ERROR')) div.classList.add('log-error');
  div.textContent = `› ${txt}`;
  terminal.appendChild(div);
  const cur = document.createElement('span');
  cur.className = 'term-cursor';
  terminal.appendChild(cur);
  terminal.scrollTop = terminal.scrollHeight;
});

listen('progress-event', e => {
  const { id, percentage, filename, thumbnail } = e.payload;
  let card = document.getElementById(`card-${id}`);
  if (!card) card = makeCard(id, filename, thumbnail);
  const pct = parseFloat(percentage) || 0;
  card.querySelector('.fill').style.width = pct + '%';
  card.querySelector('.pct').textContent = Math.round(pct) + '%';
  const fn = card.querySelector('.fname');
  if (filename && filename !== 'Downloading...' && fn.textContent !== filename)
    fn.textContent = filename;
});

listen('download-finished', e => {
  const { id, filename } = e.payload;
  const card = document.getElementById(`card-${id}`);
  if (card) {
    card.classList.add('completed');
    card.querySelector('.fill').style.width = '100%';
    card.querySelector('.pct').textContent = '100%';
  }
  toast(`✅ Done: ${filename}`);
});

function makeCard(id, filename, thumb) {
  const d = document.createElement('div');
  d.className = 'card';
  d.id = `card-${id}`;
  const src = thumb || 'https://via.placeholder.com/96x58/0a1628/00d4ff?text=RTX';
  d.innerHTML = `
    <img src="${src}" class="thumb-img" onerror="this.src='https://via.placeholder.com/96x58/0a1628/00d4ff?text=RTX'">
    <div class="card-content">
      <div class="fname">${filename}</div>
      <div class="progress-row">
        <div class="progress-bar"><div class="fill"></div></div>
        <div class="pct">0%</div>
      </div>
    </div>`;
  document.getElementById('list').insertBefore(d, document.getElementById('list').firstChild);
  return d;
}

document.getElementById('start-btn').onclick = async () => {
  const inputs = document.querySelectorAll('.url-input');
  const formatType = document.getElementById('format-select').value;
  if (!savePath) return message('Select a save location first.', { kind:'error', title:'RTX Error' });
  inputs.forEach(async (inp, i) => {
    const url = inp.value.trim();
    if (!url) return;
    try { await invoke('download_media', { id:i, url, savePath, formatType }); }
    catch (err) { toast('❌ ' + err); }
  });
};

const closeModal = () => { document.getElementById('folder-modal').style.display = 'none'; };
window.closeModal = closeModal;

document.getElementById('btn-save').onclick = async () => {
  document.getElementById('folder-modal').style.display = 'flex';
  await loadFolders(null);
};

document.getElementById('modal-close-btn').onclick = closeModal;

document.getElementById('modal-back-btn').onclick = async () => {
  try {
    const p = await invoke('get_parent_dir', { currentPath: currentNavPath });
    await loadFolders(p);
  } catch { toast('Already at root'); }
};

document.getElementById('modal-new-folder-btn').onclick = async () => {
  const name = prompt('New folder name:');
  if (name?.trim()) {
    try {
      await invoke('create_new_folder', { parentPath: currentNavPath, name: name.trim() });
      toast('✅ Folder created');
      await loadFolders(currentNavPath);
    } catch (e) { toast('❌ ' + e); }
  }
};

document.getElementById('modal-select-btn').onclick = () => {
  savePath = currentNavPath;
  const badge = document.getElementById('path-badge');
  badge.classList.add('active');
  document.getElementById('path-info').textContent = savePath;
  closeModal();
  toast('✅ Location selected');
};

async function loadFolders(path) {
  try {
    if (path !== null && path !== undefined) {
      currentNavPath = path;
    } else {
      const home = await invoke('list_folders', { currentPath: null });
      if (home.length > 0)
        currentNavPath = home[0].path.substring(0, home[0].path.lastIndexOf('/'));
    }
    document.getElementById('current-path-display').textContent = currentNavPath;
    const folders = await invoke('list_folders', { currentPath: path });
    const container = document.getElementById('folder-list-container');
    container.innerHTML = '';
    if (!folders.length) {
      container.innerHTML = '<div class="empty-msg">📭 &nbsp; Empty directory</div>';
      return;
    }
    folders.forEach(f => {
      const item = document.createElement('div');
      item.className = 'folder-item';
      item.innerHTML = `<span>📁</span><span>${f.name}</span>`;
      item.onclick = () => loadFolders(f.path);
      container.appendChild(item);
    });
  } catch (e) { toast('Error: ' + e); }
}
</script>
</body>
</html>
