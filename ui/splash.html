<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: rgba(15, 17, 26, 0); /* Transparent back */
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .loader-container {
    text-align: center;
    background: rgba(26, 28, 39, 0.9);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(0, 230, 118, 0.2);
    box-shadow: 0 0 30px rgba(0, 230, 118, 0.1);
  }
  .logo {
    font-size: 32px;
    font-weight: 800;
    color: #00e676;
    margin-bottom: 20px;
    letter-spacing: -1px;
    text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #00e676;
    border-radius: 50%;
    animation: spin 1s ease-in-out infinite;
    margin: 0 auto;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .text {
    color: #94a3b8;
    margin-top: 15px;
    font-size: 14px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="loader-container">
  <div class="logo">YT Downloader Pro</div>
  <div class="spinner"></div>
  <div class="text">INITIALIZING SYSTEMS...</div>
</div>
</body>
</html>
