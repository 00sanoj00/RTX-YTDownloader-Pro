<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader Pro v3 | 2026 Edition</title>
  <style>
    :root {
      --bg: #030712;
      --panel-bg: rgba(17, 24, 39, 0.7);
      --card-bg: rgba(31, 41, 55, 0.5);
      --primary: #00ff88; /* Cyber Green */
      --primary-glow: rgba(0, 255, 136, 0.3);
      --accent: #ff0055; /* Neon Red */
      --accent-glow: rgba(255, 0, 85, 0.3);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.05);
      --glass: blur(12px) saturate(180%);
    }

    * { box-sizing: border-box; outline: none; }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 10% 10%, rgba(0, 255, 136, 0.05) 0px, transparent 50%),
        radial-gradient(at 90% 90%, rgba(255, 0, 85, 0.05) 0px, transparent 50%);
      color: var(--text);
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 750px;
      background: var(--panel-bg);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.5s ease-out;
      min-width: 500px;  /* ඇතුළත content එක ආරක්ෂා කරයි */
      min-height: 800px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h2 { 
      text-align: center; 
      color: var(--text); 
      margin-bottom: 35px; 
      font-weight: 900; 
      letter-spacing: -1.5px; 
      font-size: 32px;
      background: linear-gradient(to right, #fff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #path-info { 
      font-size: 13px; 
      color: var(--text-muted); 
      text-align: center; 
      margin-bottom: 30px; 
      background: rgba(0,0,0,0.2);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 15px;
      margin-bottom: 18px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

    input {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 15px var(--primary-glow);
      background: rgba(0, 0, 0, 0.3);
    }

    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn:active { transform: scale(0.97); }

    .btn-folder { background: #1f2937; color: white; width: 100%; margin-bottom: 15px; border: 1px solid var(--border); }
    .btn-folder:hover { background: #374151; border-color: rgba(255,255,255,0.1); }

    .btn-add { background: var(--primary); color: #000; width: 56px; font-size: 22px; box-shadow: 0 4px 15px var(--primary-glow); }
    .btn-add:hover { box-shadow: 0 6px 20px var(--primary-glow); transform: translateY(-2px); }

    .btn-download {
      background: var(--accent);
      color: white;
      width: 100%;
      font-size: 16px;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn-download:hover { box-shadow: 0 8px 25px var(--accent-glow); transform: translateY(-2px); }

    /* Modern Glassmorphic Card */
    .card {
      display: flex;
      gap: 20px;
      background: var(--card-bg);
      backdrop-filter: blur(5px);
      padding: 15px;
      border-radius: 18px;
      margin-top: 18px;
      border: 1px solid var(--border);
      align-items: center;
      transition: all 0.3s;
      opacity: 0; animation: fadeIn 0.4s forwards;
    }

    .card:hover { border-color: rgba(255,255,255,0.1); background: rgba(55, 65, 81, 0.5); }

    .thumb-img {
      width: 110px;
      height: 65px;
      border-radius: 12px;
      object-fit: cover;
      background: #000;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .card-content { flex: 1; min-width: 0; }

    .fname { 
      font-size: 15px; 
      font-weight: 600; 
      margin-bottom: 8px; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      color: #fff;
    }

    .progress-container { display: flex; align-items: center; gap: 12px; }

    .progress-bar {
      flex: 1;
      background: rgba(0,0,0,0.3);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .logo-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 25px; /* පහළ තියෙන elements එක්ක පරතරය */
        flex-shrink: 0;      /* Header එක resize වෙනකොට මේක හැකිලෙන්න දෙන්න එපා */
      }

      .app-logo {
        max-width: 450px;    /* ලෝගෝ එකේ පළල ඔයාට අවශ්‍ය ප්‍රමාණයට මෙතනින් වෙනස් කරන්න */
        height: auto;        /* උස ඉබේම හැඩගැසෙන්න */
        filter: drop-shadow(0 0 10px var(--primary-glow)); /* ලෝගෝ එක වටා පොඩි glow එකක් දාන්න */
        transition: transform 0.3s ease;
      }

      .app-logo:hover {
        transform: scale(1.05); /* මවුස් එක උඩට ගියපුවම පොඩ්ඩක් ලොකු වෙන්න */
      }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #fff);
      width: 0%;
      transition: width 0.3s ease-out;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    .pct { font-size: 13px; color: var(--primary); font-weight: 800; font-family: monospace; width: 45px; text-align: right; }

    /* Completed State */
    .card.completed { border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
    .card.completed .fname { color: var(--primary); }
    .card.completed .fill { background: var(--primary); }

    /* Futuristic Toast */
    #toast {
      visibility: hidden;
      min-width: 300px;
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(10px);
      color: #fff;
      text-align: center;
      border-radius: 16px;
      padding: 18px;
      position: fixed;
      z-index: 1000;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%) translateY(20px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid var(--primary);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <style>
  #terminal {
    width: 100%;
    height: 150px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 20px;
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #00ff88;
    overflow-y: auto;
    white-space: pre-wrap;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }
  .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(0, 255, 136, 0.05); }
  .log-error { color: #ff0055; }
</style>


</head>
<body>

<div class="container">
  <div class="logo-container">
    <img src="logoo.png" alt="RTX Logo" class="app-logo">
  </div>
  
  <button id="btn-save" class="btn btn-folder">📂 SELECT SAVE LOCATION</button>
  <div id="path-info">No folder selected</div>

  <div id="input-container">
    <div class="input-row">
      <input type="text" class="url-input" placeholder="Paste YouTube Link...">
      <button class="btn btn-add" id="add-url">+</button>
    </div>
  </div>

  <button id="start-btn" class="btn btn-download">🚀 START CORE DOWNLOAD</button>

  <div id="list"></div>
  <div id="terminal">--- SYSTEM LOG INITIALIZED [RTX CORE v3.0] ---</div>
</div>

<div id="toast"></div>

<script type="module">
  const { invoke } = window.__TAURI__.core;
  const { open, message } = window.__TAURI__.dialog;
  const { listen } = window.__TAURI__.event;

  let savePath = "";

  document.getElementById('btn-save').onclick = async () => {
    const res = await open({ directory: true, title: "Select Core Download Location" });
    if (res) {
      savePath = res;
      document.getElementById('path-info').innerText = "📍 LOCATION SET: " + res;
    }
  };

  document.getElementById('add-url').onclick = () => {
    const div = document.createElement('div');
    div.className = 'input-row';
    div.innerHTML = '<input type="text" class="url-input" placeholder="Paste YouTube Link...">';
    document.getElementById('input-container').appendChild(div);
  };

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 3500);
  }

  listen('progress-event', (event) => {
    const { id, percentage, filename, thumbnail } = event.payload;
    let card = document.getElementById(`card-${id}`);
    
    if (!card) { card = createCard(id, filename, thumbnail); }
    
    const fill = card.querySelector('.fill');
    const pctText = card.querySelector('.pct');
    const nameText = card.querySelector('.fname');
    
    const pctVal = parseFloat(percentage) || 0;
    
    fill.style.width = pctVal + '%';
    pctText.innerText = Math.round(pctVal) + '%';
    
    if(filename && filename !== "Downloading..." && nameText.innerText !== filename) {
      nameText.innerText = filename;
    }
  });

  listen('download-finished', (event) => {
    const { id, filename } = event.payload;
    let card = document.getElementById(`card-${id}`);
    
    if (card) {
      card.classList.add('completed');
      card.querySelector('.fill').style.width = '100%';
      card.querySelector('.pct').innerText = '100%';
    }
    showToast(`✅ CORE DOWNLOAD COMPLETE: ${filename}`);
  });

  function createCard(id, filename, thumb) {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${id}`;
    const thumbSrc = thumb ? thumb : 'https://via.placeholder.com/110x65/1f2937/00ff88?text=YT+PRO';
    
    div.innerHTML = `
      <img src="${thumbSrc}" class="thumb-img" onerror="this.src='https://via.placeholder.com/110x65/1f2937/00ff88?text=YT+PRO'">
      <div class="card-content">
        <div class="fname">${filename}</div>
        <div class="progress-container">
            <div class="progress-bar"><div class="fill"></div></div>
            <div class="pct">0%</div>
        </div>
      </div>
    `;
    const list = document.getElementById('list');
    list.insertBefore(div, list.firstChild);
    return div;
  }

  document.getElementById('start-btn').onclick = async () => {
    const inputs = document.querySelectorAll('.url-input');
    if (!savePath) return await message("CRITICAL: Select save folder first!", { kind: 'error', title: 'System Error' });

    inputs.forEach(async (input, index) => {
      const url = input.value.trim();
      if (url) {
        try {
          // JS camelCase (savePath)
          await invoke('download_mp3', { id: index, url, savePath: savePath });
        } catch (err) {
          showToast("❌ System Error: " + err);
        }
      }
    });
  };

  // index.html හි script එක ඇතුළත
    listen('log-event', (event) => {
        const terminal = document.getElementById('terminal');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        // පේළිය Error එකක් නම් රතු පාට කරන්න
        if (event.payload.includes("ERROR:")) {
            entry.classList.add('log-error');
        }
        
        entry.innerText = `> ${event.payload}`;
        terminal.appendChild(entry);
        
        // හැමවෙලේම පල්ලෙහාටම auto-scroll වෙන්න
        terminal.scrollTop = terminal.scrollHeight;
    });
</script>

</body>
</html>
